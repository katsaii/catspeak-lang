# Catspeak cartridge layout #
# ========================= #

# Types:
#
# * u8: Unsigned 8-bit integer.
# * u32: Unsigned 32-bit integer.
# * f64: 64-bit floating point number.
# * string: A sequence of UTF-8 characters terminated by a `\0` (null).

# The header comes first. In the order they are defined below, these values are
# written to the start of the buffer.

head-order: [signal, title, version]
head:
  signal:
    value-unfinished: 0xC7544E #< The colour of Wanda,  if you know you know.
    value: 0x5B7859            #< The colour of Forest, if you know you know.
    type: u32
  title:
    value: "CATSPEAK CART"
    type: string
  version:
    value: 1
    type: u8

# The meta section follows the header, and stores information about where the
# cartridge came from. For example, the path to the source file and the author.
#
# In the order defined below, these are:

meta-order: [name, path, author, major, minor, patch]
meta:
  name:
    desc: "the name of this cartridge"
    type: string
  path:
    desc: "the path to the file containing source code for this cartridge"
    type: string
  author:
    desc: "the author of this cartridge"
    type: string
  major:
    desc: "the major version of this cartridge"
    type: u8
  minor:
    desc: "the minor version of this cartridge"
    type: u8
  patch:
    desc: "the patch number of this cartridge"
    type: u8
