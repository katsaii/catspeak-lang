# Catspeak cartridge layout #
# ========================= #

# Types:
#
# * i32:    Signed 32-bit integer.
# * u32:    Unsigned 32-bit integer.
# * i16:    Signed 16-bit integer.
# * u16:    Unsigned 16-bit integer.
# * i8:     Signed 8-bit integer.
# * u8:     Unsigned 8-bit integer.
# * f64:    64-bit floating point number.
# * char:   A single UTF-8 encoded character.
# * string: A sequence of UTF-8 characters terminated by `\0` (null).
# * bool:   Unsigned 8-bit integer, assumed to be exclusively 0 or 1.

# The header comes first. In the order they are defined below, these values are
# written to the start of the buffer.

head-order: [signal-w, signal-f, title, cart-version]
head:
  signal-w:
    value: 0xC7544E #< The colour of Wanda, if you know you know.
    type: u32
  signal-f:
    value: 0x5B7859 #< The colour of Forest, if you know you know.
    type: u32
  title:
    value: "CATSPEAK CART"
    type: string
  cart-version:
    value: 1
    type: u8

# The meta section follows the header, and stores information about where the
# cartridge came from. For example, the path to the source file and the author.
#
# In the order defined below, these are:

meta-order: [name, author, version, version-minor, patch, path, date]
meta:
  name:
    desc: "the name of this cartridge"
    type: string
    default: "untitled"
  author:
    desc: "the author of this cartridge"
    type: string
  version:
    desc: "the major version of this cartridge"
    type: u8
    default: 1
  version-minor:
    desc: "the minor version of this cartridge"
    type: u8
  patch:
    desc: "the patch number of this cartridge"
    type: u8
  path:
    desc: "the path to the file containing source code for this cartridge"
    type: string
  date:
    desc: "the date this cartridge was compiled, in Unix time"
    type: u32

# Next, is the program section. This is where the executable code of a
# Catspeak cartridge lives, and consists of a sequence of function definitions
# terminated by `\0` (null).

# A function definition consists of two parts:
# * A sequence of instructions, terminated by `\0` (null).
# * Followed by information about the enclosing function this sequence of
#   instructions belongs to.

# Each instruction starts with an opcode followed by a 32-bit encoded line
# and column number. (For information on how to encode line and columns, see:
# https://www.katsaii.com/catspeak-lang/3.2.0/lib-init.html#catspeak_location_create)
#
# An example instruction definition is shown below:
#
#   name: "example"                     #< The name of the instruction.
#   name-short: "ex_1"                  #< A shorter name for the instruction.
#   desc: "just an example instruction" #< Instruction description.
#   opcode: 0x0F                        #< Underlying opcode representation.
#   args:
#     - name: "n"                                   #< Operand name.
#       desc: "the number of hoops to jump through" #< Operand description.
#       type: u8                                    #< Operand type.
#   stackargs:
#     - name: "m" #< Pop value off the stack, and associate it with a name.
#       desc: "the number of additional hoops to jump through"
#
# The IR then encodes each argument of an instruction in the order they appear
# below (i.e. the `args` field of each instruction):

instr-opcode-type: u8 #< The type used for opcodes.
instr-dbg-type: u32   #< The type used for debug info.
instr:

  - name: "call"
    name-short: call
    desc: "call a function expression"
    opcode: 0x34
    args:
      - name: n
        desc: "the number of arguments in this call"
        type: u16
    stackargs:
      - name: callee
        desc: "the function to call"
      - name: args
        desc: "the arguments to call `callee` with"
        many: n

  - name: "array"
    name-short: arr
    desc: "construct an array"
    opcode: 0x2C
    args:
      - name: n
        desc: "the size of this array literal"
        type: u16
    stackargs:
      - name: values
        desc: "the values of the array to insert"
        many: n
    exceptional: false

  - name: "struct"
    name-short: obj
    desc: "construct a struct literal"
    opcode: 0x2B
    args:
      - name: n
        desc: "the size of this struct literal, must be a multiple of 2"
        type: u16
    stackargs:
      - name: values
        desc: "the values of the struct to insert, must be key-value pairs"
        many: n
    exceptional: false

  - name: "loop inf"
    name-short: loop_inf
    desc: "loop infinitely"
    opcode: 0x26
    stackargs:
      - name: body
        desc: "the body of the loop to execute"
    exceptional: false

  - name: "loop"
    name-short: loop
    desc: "loop whilst a condition is true"
    opcode: 0x27
    stackargs:
      - name: cond
        desc: "the condition of the loop to check"
      - name: body
        desc: "the body of the loop to execute"

  - name: "loop step"
    name-short: loop_s
    desc: "loop whilst a condition is true, evaluating an expression every iteration"
    opcode: 0x28
    stackargs:
      - name: cond
        desc: "the condition of the loop to check"
      - name: step
        desc: "the step expression to evaluate at the end of every iteration"
      - name: body
        desc: "the body of the loop to execute"

  - name: "loop with"
    name-short: loop_w
    desc: "perform a GML-style `with` loop over all instances of an object"
    opcode: 0x29
    stackargs:
      - name: cond
        desc: "the condition of the loop to check"
      - name: body
        desc: "the body of the loop to execute"

  - name: "unwind"
    name-short: uwnd
    desc: "jump to the end of a landing block"
    opcode: 0x25
    args:
      - name: label
        desc: "the label to unwind to"
        type: u32
    stackargs:
      - name: value
        desc: "the value to unwind with"
    exceptional: false #< May use exceptions to do unwinding, but well-formed
                       #< code shouldn't be "exceptional" or leak this
                       #< implementation detail.

  - name: "unwind landing"
    name-short: land
    desc: "catch the result of an `unwind` instruction"
    opcode: 0x24
    args:
      - name: label
        desc: "the label of this expression"
        type: u32
    stackargs:
      - name: body
        desc: "the body of the code containing an `unwind` instruction"
    exceptional: false

  - name: "throw"
    name-short: thrw
    desc: "throw a value as an exception"
    opcode: 0x22
    stackargs:
      - name: value
        desc: "the exception value to throw"

  - name: "catch"
    name-short: cat
    desc: "catch an exception"
    opcode: 0x2A
    args:
      - name: idx
        desc: "the id of the local variable to assign the exception value to"
        type: u32
    stackargs:
      - name: eager
        desc: "the body of the code which may raise an exception"
      - name: lazy
        desc: "the body of the code which handles the exception"
    exceptional: false

  - name: "get local"
    name-short: get_l
    desc: "get a value of the local variable with the given id"
    opcode: 0x04
    args:
      - name: idx
        desc: "the id of the local variable to get"
        type: u32
    exceptional: false

  - name: "set local"
    name-short: set_l
    desc: "assign a value to the local variable with the given id"
    opcode: 0x1D
    args:
      - name: flavour
        desc: "the flavour of assignment to use"
        type: char
        values: ["=", "+", "-", "*", "/"] #< As chars, i.e. `ord("=")` in GML.
      - name: idx
        desc: "the id of the local variable to set"
        type: u32
    stackargs:
      - name: value
        desc: "the value to assign to this local variable"
    exceptional: false

  - name: "global"
    name-short: glob
    desc: "get a reference to the global variable struct for this cartridge"
    opcode: 0x2F
    exceptional: false

  - name: "self"
    name-short: self
    desc: "get a reference to the current 'self' scope"
    opcode: 0x1E
    exceptional: false

  - name: "other"
    name-short: othr
    desc: "get a reference to the current 'other' scope"
    opcode: 0x1F
    exceptional: false

  - name: "get index string"
    name-short: get_is
    desc: "get a value from a collection at the given string index"
    opcode: 0x30
    args:
      - name: idx
        desc: "the index of the collection"
        type: string
    stackargs:
      - name: data
        desc: "the collection to access"

  - name: "set index string"
    name-short: set_is
    desc: "assign a value to a collection at the given index"
    opcode: 0x31
    args:
      - name: flavour
        desc: "the flavour of assignment to use"
        type: char
        values: ["=", "+", "-", "*", "/"] #< As chars, i.e. `ord("=")` in GML.
      - name: idx
        desc: "the index of the collection"
        type: string
    stackargs:
      - name: data
        desc: "the collection to access"
      - name: value
        desc: "the value to assign to this collection"

  - name: "get index number"
    name-short: get_in
    desc: "get a value from a collection at the given numeric index"
    opcode: 0x32
    arg:
      - name: idx
        desc: "the index of the collection"
        type: f64
    stackargs:
      - name: data
        desc: "the collection to access"

  - name: "set index number"
    name-short: set_in
    desc: "assign a value to a collection at the given numeric index"
    opcode: 0x33
    args:
      - name: flavour
        desc: "the flavour of assignment to use"
        type: char
        values: ["=", "+", "-", "*", "/"] #< As chars, i.e. `ord("=")` in GML.
      - name: idx
        desc: "the index of the collection"
        type: f64
    stackargs:
      - name: data
        desc: "the collection to access"
      - name: value
        desc: "the value to assign to this collection"

  - name: "get index"
    name-short: get_i
    desc: "get a value from a collection at the given index"
    opcode: 0x2E
    stackargs:
      - name: data
        desc: "the collection to access"
      - name: idx
        desc: "the index of the collection"

  - name: "set index"
    name-short: set_i
    desc: "assign a value to a collection at the given index"
    opcode: 0x2D
    args:
      - name: flavour
        desc: "the flavour of assignment to use"
        type: char
        values: ["=", "+", "-", "*", "/"] #< As chars, i.e. `ord("=")` in GML.
    stackargs:
      - name: data
        desc: "the collection to access"
      - name: idx
        desc: "the index of the collection"
      - name: value
        desc: "the value to assign to this collection"

  - name: "sequence" #< Behaves similar to comma expressions in JavaScript.
    name-short: seq
    desc: "evaluate n-many expressions, implicitly returning the final expression"
    opcode: 0x02
    args:
      - name: n
        desc: "the number of expressions to evaluate"
        type: u32
    stackargs:
      - name: stmts
        desc: "the computations to run for this sequence"
        many: n
    exceptional: false

  - name: "closure"
    name-short: fclo
    desc: "return a reference to a function"
    opcode: 0x1B
    args:
      - name: idx
        desc: "the numeric id of the function to get"
        type: u32
    intrinsic: true
    exceptional: false

  - name: "if then else"
    name-short: ifte
    desc: "evaluate one of two expressions, depending on whether a condition is true or false"
    opcode: 0x1C
    stackargs:
      - name: condition
        desc: "the condition to check for"
      - name: if_true
        desc: "the code to run if the condition evaluates to true"
      - name: if_false
        desc: "the code to run if the condition evaluates to false"
    comptime: "$condition$ ? $if_true$ : $if_false$"

  - name: "or"
    desc: "calculate the logical OR of two values"
    opcode: 0x13
    stackargs:
      - name: eager
        desc: "the left-hand-side value of the expression"
      - name: lazy
        desc: "the right-hand-side value of the expression, only evaluated if `eager` is falsy"
    comptime: $eager$ || $lazy$

  - name: "xor"
    desc: "calculate the logical XOR of two values"
    opcode: 0x14
    stackargs:
      - name: lhs
        desc: "the left-hand-side value of the expression"
      - name: rhs
        desc: "the right-hand-side value of the expression"
    comptime: $lhs$ ^^ $rhs$

  - name: "and"
    desc: "calculate the logical AND of two values"
    opcode: 0x12
    stackargs:
      - name: eager
        desc: "the left-hand-side value of the expression"
      - name: lazy
        desc: "the right-hand-side value of the expression, only evaluated if `eager` is truthy"
    comptime: $eager$ && $lazy$

  - name: "equal"
    name-short: eq
    desc: "check whether two values are equal"
    opcode: 0x0B
    stackargs:
      - name: lhs
        desc: "the left-hand-side value of the equality"
      - name: rhs
        desc: "the right-hand-side value of the equality"
    comptime: $lhs$ == $rhs$
    exceptional: false

  - name: "not equal"
    name-short: neq
    desc: "check whether two values are NOT equal"
    opcode: 0x0C
    stackargs:
      - name: lhs
        desc: "the left-hand-side value of the equality"
      - name: rhs
        desc: "the right-hand-side value of the equality"
    comptime: $lhs$ != $rhs$
    exceptional: false

  - name: "less than"
    name-short: lt
    desc: "check whether a value is less than another"
    opcode: 0x0F
    stackargs:
      - name: lhs
        desc: "the left-hand-side value of the inequality"
      - name: rhs
        desc: "the right-hand-side value of the inequality"
    comptime: $lhs$ < $rhs$

  - name: "less than or equal to"
    name-short: leq
    desc: "check whether a value is less than or equal to another"
    opcode: 0x10
    stackargs:
      - name: lhs
        desc: "the left-hand-side value of the inequality"
      - name: rhs
        desc: "the right-hand-side value of the inequality"
    comptime: $lhs$ <= $rhs$

  - name: "greater than"
    name-short: gt
    desc: "check whether a value is greater than another"
    opcode: 0x0D
    stackargs:
      - name: lhs
        desc: "the left-hand-side value of the inequality"
      - name: rhs
        desc: "the right-hand-side value of the inequality"
    comptime: $lhs$ > $rhs$

  - name: "greater than or equal to"
    name-short: geq
    desc: "check whether a value is greater than or equal to another"
    opcode: 0x0E
    stackargs:
      - name: lhs
        desc: "the left-hand-side value of the inequality"
      - name: rhs
        desc: "the right-hand-side value of the inequality"
    comptime: $lhs$ >= $rhs$

  - name: "bitwise and"
    name-short: band
    desc: "calculate the bitwise AND of two values"
    opcode: 0x16
    stackargs:
      - name: lhs
        desc: "the left-hand-side value of the expression"
      - name: rhs
        desc: "the right-hand-side value of the expression"
    comptime: $lhs$ & $rhs$

  - name: "bitwise or"
    name-short: bor
    desc: "calculate the bitwise OR of two values"
    opcode: 0x17
    stackargs:
      - name: lhs
        desc: "the left-hand-side value of the expression"
      - name: rhs
        desc: "the right-hand-side value of the expression"
    comptime: $lhs$ | $rhs$

  - name: "bitwise xor"
    name-short: bxor
    desc: "calculate the bitwise XOR of two values"
    opcode: 0x18
    stackargs:
      - name: lhs
        desc: "the left-hand-side value of the expression"
      - name: rhs
        desc: "the right-hand-side value of the expression"
    comptime: $lhs$ ^ $rhs$

  - name: "bitwise shift left"
    name-short: lshift
    desc: "calculate the bitwise left shift of two values"
    opcode: 0x1A
    stackargs:
      - name: value
        desc: "the value to shift"
      - name: amount
        desc: "the amount of bits to shift left by"
    comptime: $value$ << $amount$

  - name: "bitwise shift right"
    name-short: rshift
    desc: "calculate the bitwise right shift of two values"
    opcode: 0x19
    stackargs:
      - name: value
        desc: "the value to shift"
      - name: amount
        desc: "the amount of bits to shift right by"
    comptime: $value$ >> $amount$

  - name: "add"
    desc: "calculate the sum of two values"
    opcode: 0x05
    stackargs:
      - name: lhs
        desc: "the left-hand-side value of the sum"
      - name: rhs
        desc: "the right-hand-side value of the sum"
    comptime: $lhs$ + $rhs$

  - name: "subtract"
    name-short: sub
    desc: "calculate the difference of two values"
    opcode: 0x0A
    stackargs:
      - name: lhs
        desc: "the value to subtract from"
      - name: rhs
        desc: "the value to subtract"
    comptime: $lhs$ - $rhs$

  - name: "multiply"
    name-short: mult
    desc: "calculate the product of two values"
    opcode: 0x07
    stackargs:
      - name: lhs
        desc: "the left-hand-side value of the product"
      - name: rhs
        desc: "the right-hand-side value of the product"
    comptime: $lhs$ * $rhs$

  - name: "divide"
    name-short: div
    desc: "calculate the division of two values"
    opcode: 0x08
    stackargs:
      - name: lhs
        desc: "the dividend"
      - name: rhs
        desc: "the divisor"
    comptime: $lhs$ / $rhs$

  - name: "divide int"
    name-short: idiv
    desc: "calculate the integer division of two values"
    opcode: 0x09
    stackargs:
      - name: lhs
        desc: "the dividend"
      - name: rhs
        desc: "the divisor"
    comptime: $lhs$ div $rhs$

  - name: "remainder"
    name-short: rem
    desc: "calculate the remainder of two values"
    opcode: 0x06
    stackargs:
      - name: lhs
        desc: "the dividend"
      - name: rhs
        desc: "the divisor"
    comptime: $lhs$ % $rhs$

  - name: "positive"
    name-short: pos
    desc: "calculate the positive of a value"
    opcode: 0x21
    stackargs:
      - name: value
        desc: "the value to add to 0"
    comptime: +$value$

  - name: "negative"
    name-short: neg
    desc: "calculate the negative of a value"
    opcode: 0x20
    stackargs:
      - name: value
        desc: "the value to subtract from 0"
    comptime: -$value$

  - name: "not"
    desc: "calculate the logical negation of a value"
    opcode: 0x11
    stackargs:
      - name: value
        desc: "the value to negate"
    comptime: "!$value$"

  - name: "bitwise not"
    name-short: bnot
    desc: "calculate the bitwise negation of a value"
    opcode: 0x15
    stackargs:
      - name: value
        desc: "the value to bitwise negate"
    comptime: ~$value$

  - name: "const number"
    name-short: const_n
    desc: "get a numeric constant"
    opcode: 0x01
    args:
      - name: value
        desc: "the number to emit"
        type: f64
    exceptional: false
    comptime: $value$
    force-inline:
      - name: "0"
        conditions:
          - [value, 0]
      - name: "1" #< Common in incrementation e.g. x += 1
        conditions:
          - [value, 1]
      - name: "2" #< Common in divisions e.g. x /= 2
        conditions:
          - [value, 2]
      - name: "3"
        conditions:
          - [value, 3]
      - name: "4" #< Common with bitwise operations (up until 256).
        conditions:
          - [value, 4]
      - name: "8"
        conditions:
          - [value, 8]
      - name: "16"
        conditions:
          - [value, 16]
      - name: "24"
        conditions:
          - [value, 24]
      - name: "32"
        conditions:
          - [value, 32]
      - name: "64"
        conditions:
          - [value, 64]
      - name: "128"
        conditions:
          - [value, 128]
      - name: "256"
        conditions:
          - [value, 256]
      - name: "10"
        conditions:
          - [value, 10]
      - name: "100" #< Common when dealing with percentages.
        conditions:
          - [value, 100]
      - name: "1k"  #< Common when converting between s and ms.
        conditions:
          - [value, 1000]
      - name: "1m"  #< Common when converting between s and us.
        conditions:
          - [value, 1000000]

  - name: "const string"
    name-short: const_s
    desc: "get a string constant"
    opcode: 0x03
    args:
      - name: value
        desc: "the string to emit"
        type: string
    exceptional: false
    comptime: $value$
    force-inline:
      - name: empty
        conditions:
          - [value, ""]
      - name: star  #< Common when dealing with files. (GLOB patterns)
        conditions:
          - [value, "*"]
      - name: slash #< Common when dealing with file paths.
        conditions:
          - [value, "/"]
      - name: x
        conditions:
          - [value, "x"]
      - name: y
        conditions:
          - [value, "y"]

  - name: "const undefined"
    name-short: const_u
    desc: "get the undefined constant"
    opcode: 0x23
    exceptional: false
    comptime: undefined

func-argc-type: u8

# Notes:
#
# * Both Catspeak instructions and function definitions are encoded in
#   reverse-polish notation. This simplifies writing a non-blocking (async)
#   code-generator in a single-threaded language like GML.
#
# * There is no padding or alignment applied to instructions, and they are
#   packed as closely together as possible, despite not having a consistent
#   length.

# Finally, every cartridge ends with 0xFF of type u8. (The same type as
# `instr-opcode-type`!)

program-end-signal: 0xFF